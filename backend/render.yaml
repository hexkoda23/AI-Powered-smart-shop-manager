services:
  - type: web
    name: notable-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FIREBASE_CONFIG_JSON
        sync: false
      - key: notable
        sync: false
      - key: OPENAI_API_KEY
        sync: false
